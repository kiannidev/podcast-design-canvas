<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio Cleanup Controls Prototype</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #16211f;
        --muted: #5e6b67;
        --line: #d9e0dd;
        --panel: #f7faf8;
        --accent: #136f63;
        --warn: #a15c00;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background: #ffffff;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1, h2, p { margin-top: 0; }

      h1 {
        font-size: 32px;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .lede {
        color: var(--muted);
        max-width: 720px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        margin-top: 28px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
      }

      .controls {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
      }

      .control {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
      }

      .control strong { display: block; margin-bottom: 3px; }
      .control span { color: var(--muted); font-size: 13px; }

      .speakers {
        display: grid;
        gap: 10px;
      }

      .speaker {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      select {
        min-height: 38px;
        border: 1px solid #bfcbc7;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        padding: 8px 10px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 0 11px;
        font-weight: 700;
        font-size: 13px;
      }

      .badge.suggested { color: #7a4400; background: #fff1d6; }
      .badge.applied { color: #075246; background: #dff5ef; }
      .badge.original { color: #3f4d66; background: #e8edf5; }
      .badge.clean { color: #075246; background: #dff5ef; }

      .moments {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      .compare {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 18px;
      }

      .preview-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
      }

      .preview-card strong {
        display: block;
        font-size: 13px;
        margin-bottom: 8px;
      }

      .preview-card span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 8px;
      }

      .wave {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 52px;
        padding: 8px;
        border-radius: 6px;
        background: #eef2f0;
      }

      .wave i {
        flex: 1;
        min-width: 4px;
        border-radius: 2px;
        background: #8aa59c;
      }

      .wave.cleaned i {
        background: #2a8476;
      }

      .wave.cleaned i.soft {
        background: #6db5a8;
      }

      .effect-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .effect-tag {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 9px;
        font-size: 11px;
        font-weight: 700;
        color: #075246;
        background: #dff5ef;
      }

      @media (max-width: 640px) {
        .compare { grid-template-columns: 1fr; }
      }

      button {
        min-height: 38px;
        border: 1px solid #b9c8c3;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-weight: 700;
        padding: 7px 11px;
        cursor: pointer;
      }

      button[aria-pressed="true"] {
        border-color: var(--accent);
        background: #e0f3ee;
        color: var(--accent);
      }

      button.primary {
        border-color: #0f5d53;
        background: var(--accent);
        color: #ffffff;
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        border-radius: 999px;
        padding: 0 12px;
        font-weight: 800;
        color: #075246;
        background: #dff5ef;
      }

      .note {
        color: var(--muted);
        font-size: 13px;
        margin-top: 14px;
      }

      @media (max-width: 840px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Audio cleanup controls</h1>
      <p class="lede">Improve episode sound with plain-language quality choices — not decibel sliders. Preview cleanup on real conversation moments before applying it across the episode.</p>

      <section class="grid" aria-label="Audio cleanup workspace">
        <div class="panel">
          <h2>Quality choices</h2>
          <div class="controls" id="controls"></div>

          <h2>Preview moment</h2>
          <div class="moments" id="moments" role="group" aria-label="Preview moment"></div>

          <h2>Compare on this moment</h2>
          <div class="compare" id="compare" aria-live="polite"></div>

          <h2>Speaker balance</h2>
          <div class="speakers" id="speakers"></div>
        </div>

        <aside class="panel" aria-live="polite">
          <h2>Cleanup summary</h2>
          <div id="status" class="status">Sounds ready</div>
          <p class="note" id="summary"></p>
          <button type="button" class="primary" id="apply" style="margin-top: 14px;">Apply to episode</button>
        </aside>
      </section>
    </main>

    <script>
      const choices = [
        { id: "noise", label: "Reduce background noise", hint: "Softens room hum without dulling voices", effect: "Room hum softens; voices stay present" },
        { id: "balance", label: "Balance loudness between speakers", hint: "Keeps host and guest at a natural level", effect: "Host and guest levels move closer together" },
        { id: "quiet", label: "Enhance a quiet speaker", hint: "Lifts a soft guest without raising room noise", effect: "Soft guest lines rise without lifting the room floor" },
        { id: "echo", label: "Reduce echo or room sound", hint: "Tames hollow rooms while keeping tone natural", effect: "Hollow tail softens while speech stays natural" },
        { id: "peaks", label: "Smooth harsh or sudden peaks", hint: "Protects listeners on laughs and emphasis", effect: "Sudden laughs stay energetic but less harsh" },
        { id: "clarity", label: "Improve overall speech clarity", hint: "Helps captions stay trustworthy", effect: "Speech edges sharpen for clearer captions" },
      ];

      const previewMoments = [
        { id: "quiet-guest", label: "Quiet guest answer", note: "Lift the guest without pulling room noise forward." },
        { id: "exchange", label: "Host and guest exchange", note: "Keep both speakers natural as the conversation moves." },
        { id: "noisy-room", label: "Noisy room stretch", note: "Reduce distraction without making the room feel artificial." },
        { id: "peak", label: "Laugh or peak moment", note: "Protect listeners on sudden emphasis." },
        { id: "caption-line", label: "Caption-sensitive line", note: "Keep speech clear enough for trusted captions." },
      ];

      const momentProfiles = {
        "quiet-guest": [18, 22, 26, 24, 20, 28, 32, 30, 24, 22],
        exchange: [34, 52, 38, 56, 42, 48, 36, 54, 40, 50],
        "noisy-room": [48, 52, 46, 50, 54, 49, 53, 47, 51, 55],
        peak: [30, 34, 78, 82, 36, 32, 74, 80, 34, 30],
        "caption-line": [26, 32, 38, 42, 36, 40, 34, 38, 32, 28],
      };

      const sampleSpeakers = [
        { name: "Host — Dana Brooks", state: "not needed" },
        { name: "Guest 1 — Marcus Lee", state: "suggested" },
      ];

      let enabled = new Set(["balance", "quiet"]);
      let preview = "quiet-guest";
      let speakers = structuredClone(sampleSpeakers);
      let applied = false;

      const controlsElement = document.querySelector("#controls");
      const momentsElement = document.querySelector("#moments");
      const compareElement = document.querySelector("#compare");
      const speakersElement = document.querySelector("#speakers");
      const statusElement = document.querySelector("#status");
      const summaryElement = document.querySelector("#summary");

      document.querySelector("#apply").addEventListener("click", () => {
        applied = true;
        speakers = speakers.map((speaker) => ({
          ...speaker,
          state: speaker.state === "suggested" ? "applied" : speaker.state,
        }));
        render();
      });

      function render() {
        controlsElement.replaceChildren(...choices.map(renderChoice));
        momentsElement.replaceChildren(...previewMoments.map(renderMoment));
        renderCompare();
        speakersElement.replaceChildren(...speakers.map(renderSpeaker));

        const hasSuggested = speakers.some((speaker) => speaker.state === "suggested");
        statusElement.textContent = applied || !hasSuggested ? "Sounds ready" : "Cleanup suggested";
        summaryElement.textContent = applied
          ? `Applied ${enabled.size} cleanup choice${enabled.size === 1 ? "" : "s"} after previewing "${previewMoments.find((moment) => moment.id === preview).label.toLowerCase()}".`
          : hasSuggested
            ? "Compare original and cleaned audio on a real moment, then apply cleanup across the episode."
            : "Tracks are already clean enough for the final episode.";
      }

      function applyChoice(bars, choiceId, momentId) {
        switch (choiceId) {
          case "noise":
            if (momentId === "noisy-room") {
              return bars.map((height) => Math.round(height * 0.62 + 10));
            }
            return bars.map((height) => Math.max(16, height - 7));
          case "balance": {
            const average = bars.reduce((sum, height) => sum + height, 0) / bars.length;
            const strength = momentId === "exchange" ? 0.45 : 0.65;
            return bars.map((height) => Math.round(average + (height - average) * strength));
          }
          case "quiet":
            return bars.map((height) => (height < 34 ? Math.min(58, height + 16) : height));
          case "echo":
            return bars
              .map((height, index, list) => {
                const previous = list[index - 1] ?? height;
                const next = list[index + 1] ?? height;
                const blended = (previous + height + next) / 3;
                return Math.round(blended * 0.85 + height * 0.15);
              })
              .map((height, index) => (index % 2 === 1 ? Math.round(height * 0.82) : height));
          case "peaks":
            return bars.map((height) => (height > 62 ? Math.round(50 + (height - 62) * 0.28) : height));
          case "clarity":
            return bars.map((height) => {
              if (height >= 28 && height <= 46) {
                return Math.min(68, height + 12);
              }
              return Math.min(64, height + 4);
            });
          default:
            return bars;
        }
      }

      function buildCleanedPreview(original) {
        return choices.reduce(
          (bars, choice) => (enabled.has(choice.id) ? applyChoice(bars, choice.id, preview) : bars),
          [...original],
        );
      }

      function activeEffects() {
        return choices.filter((choice) => enabled.has(choice.id)).map((choice) => choice.effect);
      }

      function waveMarkup(heights, cleaned) {
        return heights
          .map((height) => `<i class="${cleaned ? "soft" : ""}" style="height:${height}%"></i>`)
          .join("");
      }

      function renderCompare() {
        const moment = previewMoments.find((entry) => entry.id === preview);
        const original = momentProfiles[preview];
        const cleaned = buildCleanedPreview(original);
        const effects = activeEffects();

        compareElement.replaceChildren(
          renderPreviewCard("Original", original, false, "What listeners hear now."),
          renderPreviewCard(
            "With cleanup",
            enabled.size ? cleaned : original,
            true,
            enabled.size ? moment.note : "Turn on a cleanup choice to preview the difference.",
            effects,
          ),
        );
      }

      function renderPreviewCard(title, heights, cleaned, note, effects = []) {
        const card = document.createElement("article");
        card.className = "preview-card";
        const heading = document.createElement("strong");
        heading.textContent = title;
        const wave = document.createElement("div");
        wave.className = `wave ${cleaned ? "cleaned" : ""}`;
        wave.innerHTML = waveMarkup(heights, cleaned);
        const copy = document.createElement("span");
        copy.textContent = note;

        card.append(heading, wave, copy);

        if (effects.length) {
          const tags = document.createElement("div");
          tags.className = "effect-tags";
          tags.setAttribute("aria-label", "Active cleanup effects");
          for (const effect of effects) {
            const tag = document.createElement("span");
            tag.className = "effect-tag";
            tag.textContent = effect;
            tags.appendChild(tag);
          }
          card.appendChild(tags);
        }

        return card;
      }

      function renderChoice(choice) {
        const article = document.createElement("article");
        article.className = "control";
        const copy = document.createElement("div");
        const strong = document.createElement("strong");
        strong.textContent = choice.label;
        const span = document.createElement("span");
        span.textContent = choice.hint;
        copy.append(strong, span);

        const input = document.createElement("input");
        input.type = "checkbox";
        input.checked = enabled.has(choice.id);
        input.addEventListener("change", () => {
          if (input.checked) enabled.add(choice.id);
          else enabled.delete(choice.id);
          applied = false;
          render();
        });

        article.append(copy, input);
        return article;
      }

      function renderMoment(moment) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = moment.label;
        button.setAttribute("aria-pressed", moment.id === preview ? "true" : "false");
        button.addEventListener("click", () => {
          preview = moment.id;
          render();
        });
        return button;
      }

      function renderSpeaker(speaker) {
        const article = document.createElement("article");
        article.className = "speaker";
        const head = document.createElement("div");
        head.style.display = "flex";
        head.style.justifyContent = "space-between";
        head.style.gap = "10px";

        const strong = document.createElement("strong");
        strong.textContent = speaker.name;

        const badge = document.createElement("span");
        badge.className = `badge ${speaker.state === "suggested" ? "suggested" : speaker.state === "applied" ? "applied" : "clean"}`;
        badge.textContent = speaker.state;

        head.append(strong, badge);

        const label = document.createElement("label");
        label.textContent = "Track status";
        const select = document.createElement("select");
        for (const value of ["suggested", "applied", "accepted original", "not needed"]) {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          option.selected = speaker.state === value;
          select.appendChild(option);
        }
        select.addEventListener("change", () => {
          speaker.state = select.value;
          applied = false;
          render();
        });
        label.appendChild(select);
        article.append(head, label);
        return article;
      }

      render();
    </script>
  </body>
</html>
